{% if leaderboard %}
    {% for leader in leaderboard %}
        <tr>
            <td>
                <div class="rank-badge rank-{{ loop.index }}">
                    {{ loop.index }}
                </div>
            </td>
            <td style="font-weight: 600;">
                {{ leader.fullname }}
            </td>
            <td class="text-right" style="text-align: right; color: var(--teal); font-weight: 700;">
                {{ leader.top_score }} pts
            </td>
            <td class="text-right" style="text-align: right; font-size: 0.85rem; color: var(--text-sub);">
                {{ leader.best_time }}s
            </td>
        </tr>
    {% endfor %}
{% else %}
    <tr>
        <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 20px; font-size: 0.85rem;">
            No performance records submitted yet. Be the first!
        </td>
    </tr>
{% endif %}

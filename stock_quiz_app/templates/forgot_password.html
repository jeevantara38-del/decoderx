{% extends 'base.html' %}

{% block title %}Reset Password - DECODER{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-logo">
        <div class="auth-logo-icon" style="filter: drop-shadow(0 4px 12px var(--teal-dim));">
            <img src="{{ url_for('static', filename='decoder_logo.png') }}" alt="DECODER Logo" style="width: 48px; height: 48px; object-fit: contain; border-radius: 12px;" loading="lazy">
        </div>
        <div class="auth-brand">DE<span>C</span>ODER</div>
        <div class="auth-tagline">Password Recovery</div>
    </div>

    <div class="glass auth-card">
        <div class="auth-title">Reset Password</div>
        <div class="auth-sub">Verify your details to reset your trading credentials</div>
        
        <form action="{{ url_for('forgot_password') }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group" id="fg-forgot-name">
                <input type="text" id="forgot-name" name="fullname" autocomplete="name" oninput="checkVal('fg-forgot-name','forgot-name')" onfocus="checkVal('fg-forgot-name','forgot-name')" onblur="checkVal('fg-forgot-name','forgot-name')" required>
                <label>Full Name</label>
            </div>
            
            <div class="form-group with-prefix" id="fg-forgot-phone">
                <input type="tel" id="forgot-phone" name="phone" autocomplete="tel" oninput="checkVal('fg-forgot-phone','forgot-phone')" onfocus="checkVal('fg-forgot-phone','forgot-phone')" onblur="checkVal('fg-forgot-phone','forgot-phone')" required>
                <label>Phone Number</label>
                <span class="prefix">+91</span>
            </div>
            
            <div class="form-group" id="fg-forgot-pass">
                <input type="password" id="forgot-pass" name="new_password" autocomplete="new-password" oninput="checkVal('fg-forgot-pass','forgot-pass')" onfocus="checkVal('fg-forgot-pass','forgot-pass')" onblur="checkVal('fg-forgot-pass','forgot-pass')" required>
                <label>New Password</label>
                <button class="eye-btn" type="button" onclick="toggleEye('forgot-pass',this)">Show</button>
            </div>

            <div class="form-group" id="fg-forgot-confirm-pass" style="margin-bottom:24px;">
                <input type="password" id="forgot-confirm-pass" name="confirm_password" autocomplete="new-password" oninput="checkVal('fg-forgot-confirm-pass','forgot-confirm-pass')" onfocus="checkVal('fg-forgot-confirm-pass','forgot-confirm-pass')" onblur="checkVal('fg-forgot-confirm-pass','forgot-confirm-pass')" required>
                <label>Confirm New Password</label>
                <button class="eye-btn" type="button" onclick="toggleEye('forgot-confirm-pass',this)">Show</button>
            </div>
            
            <button type="submit" class="btn-primary">Reset Password</button>
        </form>
        
        <div class="link-row mt12">
            <a href="{{ url_for('login') }}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}

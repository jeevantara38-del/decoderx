{% extends 'base.html' %}

{% block title %}Quiz Password - DECODER{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card" style="max-width: 400px; width: 100%;">
        <h2 class="auth-title">Quiz Access</h2>
        <p class="auth-subtitle">The admin has set a password for this quiz.</p>
        
        <form method="POST" action="{{ url_for('quiz') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group-clean">
                <label for="quiz_password">Enter Quiz Password</label>
                <input type="password" id="quiz_password" name="quiz_password" placeholder="Password required" required>
            </div>
            
            <button type="submit" class="btn-cyber mt-4" style="width: 100%;">Access Quiz</button>
        </form>
        
        <div style="margin-top: 20px; text-align: center;">
            <a href="{{ url_for('dashboard') }}" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">
                &larr; Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
